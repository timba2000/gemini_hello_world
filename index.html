<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gemini CLI Hello World Landing Page - A premium, interactive hello world demo.">
    <title>Hello World - Gemini CLI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>
    
    <main class="container">
        <header class="header">
            <div class="logo">
                <span class="logo-spark">✦</span>
                <span class="logo-text">Gemini CLI</span>
            </div>
            <a href="https://github.com/timba2000/gemini_hello_world" target="_blank" class="github-badge" id="github-link">
                <svg class="github-icon" viewBox="0 0 16 16" width="16" height="16"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
                <span>GitHub Repo</span>
            </a>
        </header>

        <section class="hero-section">
            <div class="badge-wrapper">
                <span class="interactive-badge">Hello, World! 👋</span>
            </div>
            <h1 class="main-title">Connected to <span class="gradient-text">Gemini CLI</span></h1>
            <p class="subtitle">Your AI-first development playground is successfully set up and linked to your GitHub repository.</p>
            
            <div class="action-card">
                <div class="card-glass">
                    <h3>Repository Details</h3>
                    <div class="repo-info">
                        <div class="info-row">
                            <span class="info-label">Name:</span>
                            <span class="info-value highlight">gemini_hello_world</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Owner:</span>
                            <span class="info-value">timba2000</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Status:</span>
                            <span class="info-value status-active">Active</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="cta-group">
                <button class="btn btn-primary" id="celebrate-btn">Celebrate Setup</button>
            </div>
        </section>
    </main>

    <!-- Celebration Overlay/Particles -->
    <div class="celebration-container" id="celebration-container"></div>

    <script src="app.js"></script>
</body>
</html>
